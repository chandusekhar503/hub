<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Catch the Ball Game</title>
  <style>
    body {
      margin: 0;
      background: url('ps4-controller.jpg') no-repeat center center fixed;
      background-size: cover;
      font-family: Arial, sans-serif;
      color: #fff;
      text-align: center;
    }
    canvas {
      background: rgba(0,0,0,0.7);
      display: block;
      margin: 20px auto;
      border: 2px solid #fff;
    }
    h1 {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>🎮 Catch the Ball!</h1>
  <canvas id="gameCanvas" width="400" height="500"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let player = { x: 180, y: 450, width: 60, height: 10, speed: 5 };
    let ball = { x: Math.random() * 380, y: 0, radius: 10, speed: 3 };
    let score = 0;

    document.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft") player.x -= player.speed;
      if (e.key === "ArrowRight") player.x += player.speed;
    });

    function drawPlayer() {
      ctx.fillStyle = "cyan";
      ctx.fillRect(player.x, player.y, player.width, player.height);
    }

    function drawBall() {
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
      ctx.fillStyle = "yellow";
      ctx.fill();
      ctx.closePath();
    }

    function drawScore() {
      ctx.fillStyle = "white";
      ctx.font = "16px Arial";
      ctx.fillText("Score: " + score, 10, 20);
    }

    function update() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawPlayer();
      drawBall();
      drawScore();

      ball.y += ball.speed;

      // Collision detection
      if (
        ball.y + ball.radius >= player.y &&
        ball.x >= player.x &&
        ball.x <= player.x + player.width
      ) {
        score++;
        resetBall();
      }

      // Missed ball
      if (ball.y > canvas.height) {
        score = 0;
        resetBall();
      }

      requestAnimationFrame(update);
    }

    function resetBall() {
      ball.x = Math.random() * (canvas.width - ball.radius * 2);
      ball.y = 0;
    }

    update();
  </script>
</body>
</html>
