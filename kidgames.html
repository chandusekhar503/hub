<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kids Game Hub</title>
  <style>
    body { font-family: Arial; background: #f0f8ff; text-align: center; }
    h1 { color: #333; }
    .game-list { display: flex; justify-content: center; flex-wrap: wrap; }
    .game-box {
      background: #fff; border: 2px solid #333; border-radius: 10px;
      width: 200px; margin: 20px; padding: 20px; cursor: pointer;
      transition: transform 0.2s;
    }
    .game-box:hover { transform: scale(1.05); background: #e0f7fa; }
  </style>
</head>
<body>
  <h1>🎮 Kids Game Hub</h1>
  <div class="game-list">
    <div class="game-box" onclick="location.href='kidgames/snake.html'">🐍 Snake Game</div>
    <div class="game-box" onclick="location.href='kidgames/catch.html'">⚽ Catch the Ball</div>
    <div class="game-box" onclick="location.href='kidgames/memory.html'">🧠 Memory Match</div>
    <div class="game-box" onclick="location.href='kidgames/maze.html'">🧩 Maze Runner</div>
  </div>
</body>
</html>
