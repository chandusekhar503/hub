<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Maze Runner Levels</title>
  <style>
    body { text-align:center; font-family:Arial; background:#f0f0f0; margin:0; padding:10px; }
    h1 { color:#333; font-size:24px; }
    #gameArea { position:relative; }
    canvas { background:#eee; display:block; margin:20px auto; border:2px solid #333; touch-action:none; }
    #overlay {
      position:absolute; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.7); display:flex; flex-direction:column;
      align-items:center; justify-content:center; color:#fff; font-size:24px;
      visibility:hidden;
    }
    #nextBtn {
      margin-top:20px; padding:10px 20px; font-size:18px;
      background:#ffeb3b; border:none; border-radius:8px; cursor:pointer;
    }
  </style>
</head>
<body>
  <h1>🧩 Maze Runner</h1>
  <div id="gameArea">
    <canvas id="maze" width="400" height="400"></canvas>
    <div id="overlay">
      <div id="congrats">🎉 Congratulations!</div>
      <canvas id="stars" width="400" height="200"></canvas>
      <button id="nextBtn">➡️ Next Level</button>
    </div>
  </div>
  <script>
    const canvas=document.getElementById("maze");
    const ctx=canvas.getContext("2d");
    const overlay=document.getElementById("overlay");
    const starsCanvas=document.getElementById("stars");
    const starsCtx=starsCanvas.getContext("2d");
    const nextBtn=document.getElementById("nextBtn");

    let player={x:20,y:20};
    let goal={x:360,y:360};
    let level=1;

    const levels=[
      [ {x:100,y:0,w:20,h:300}, {x:200,y:100,w:20,h:300}, {x:300,y:0,w:20,h:300} ],
      [ {x:50,y:50,w:300,h:20}, {x:50,y:150,w:300,h:20}, {x:50,y:250,w:300,h:20} ],
      [ {x:150,y:0,w:20,h:400}, {x:250,y:0,w:20,h:400}, {x:50,y:200,w:300,h:20} ]
    ];
    let walls=levels[0];

    // Movement controls (keyboard + mobile touch)
    document.addEventListener("keydown",e=>movePlayer(e.key));
    canvas.addEventListener("touchstart",e=>{
      const touch=e.touches[0];
      const rect=canvas.getBoundingClientRect();
      const tx=touch.clientX-rect.left;
      const ty=touch.clientY-rect.top;
      if(tx<player.x) movePlayer("ArrowLeft");
      else if(tx>player.x+20) movePlayer("ArrowRight");
      else if(ty<player.y) movePlayer("ArrowUp");
      else if(ty>player.y+20) movePlayer("ArrowDown");
    });

    function movePlayer(key){
      let dx=0,dy=0;
      if(key==="ArrowLeft") dx=-20;
      if(key==="ArrowRight") dx=20;
      if(key==="ArrowUp") dy=-20;
      if(key==="ArrowDown") dy=20;
      let newPos={x:player.x+dx,y:player.y+dy};
      if(!walls.some(w=>newPos.x<w.x+w.w && newPos.x+20>w.x && newPos.y<w.y+w.h && newPos.y+20>w.y)){
        player=newPos;
      }
    }

    function draw(){
      ctx.clearRect(0,0,400,400);
      ctx.fillStyle="green"; ctx.fillRect(goal.x,goal.y,20,20);
      ctx.fillStyle="red"; ctx.fillRect(player.x,player.y,20,20);
      ctx.fillStyle="black"; walls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));

      if(player.x===goal.x && player.y===goal.y){
        showOverlay();
      }
    }
    setInterval(draw,100);

    // Overlay celebration
    function showOverlay(){
      overlay.style.visibility="visible";
      animateStars();
    }

    function animateStars(){
      let particles=[];
      for(let i=0;i<50;i++){
        particles.push({
          x:starsCanvas.width/2,y:starsCanvas.height/2,
          dx:(Math.random()-0.5)*8,dy:(Math.random()-0.5)*8,
          emoji:Math.random()<0.5?"⭐":"🍫",life:60
        });
      }
      function loop(){
        starsCtx.clearRect(0,0,starsCanvas.width,starsCanvas.height);
        particles.forEach((p,i)=>{
          starsCtx.font="24px Arial";
          starsCtx.fillText(p.emoji,p.x,p.y);
          p.x+=p.dx; p.y+=p.dy; p.dy+=0.1; p.life--;
          if(p.life<=0) particles.splice(i,1);
        });
        if(particles.length>0) requestAnimationFrame(loop);
      }
      loop();
    }

    nextBtn.onclick=()=>{
      overlay.style.visibility="hidden";
      level++;
      if(level>levels.length){
        alert("🏆 All Levels Complete!");
        level=1;
      }
      walls=levels[level-1];
      player={x:20,y:20};
    };
  </script>
</body>
</html>
