<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Memory Match – Fruits</title>
  <style>
    body {
      text-align:center; font-family:Arial; background:#f9f9f9; margin:0; padding:10px;
    }
    h1 { color:#333; font-size:24px; }
    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(100px, 1fr));
      gap:12px;
      justify-content:center;
      margin-top:20px;
      max-width:500px;
      margin-left:auto;
      margin-right:auto;
    }
    .card {
      width:100%; aspect-ratio:1/1;
      background:#ffe0b2;
      border-radius:12px;
      display:flex; align-items:center; justify-content:center;
      font-size:40px; cursor:pointer;
      box-shadow:0 4px 6px rgba(0,0,0,0.2);
      transition: background 0.3s;
      user-select:none;
    }
    .card.revealed { background:#fff176; }
    #score { margin-top:15px; font-size:18px; color:#444; }
  </style>
</head>
<body>
  <h1>🧠 Memory Match – Fruits</h1>
  <div id="score">Score: 0</div>
  <div class="grid" id="grid"></div>
  <script>
    const grid = document.getElementById("grid");
    const scoreDisplay = document.getElementById("score");
    const emojis = [
      "🍎","🍌","🍇","🍓","🍊","🍍","🥝","🍉",
      "🍒","🍑","🥥","🍐",
      "🍎","🍌","🍇","🍓","🍊","🍍","🥝","🍉",
      "🍒","🍑","🥥","🍐"
    ];
    emojis.sort(()=>0.5-Math.random());
    let first=null, second=null, score=0, matched=0;

    emojis.forEach(e=>{
      const card=document.createElement("div");
      card.className="card";
      card.dataset.value=e;
      card.onclick=()=>{
        if(card.innerText || second) return;
        card.innerText=e;
        card.classList.add("revealed");
        if(!first){ 
          first=card; 
        } else { 
          second=card;
          if(first.dataset.value===second.dataset.value){
            score+=10; matched+=2;
            scoreDisplay.innerText="Score: "+score;
            first=null; second=null;
            if(matched===emojis.length){
              setTimeout(()=>alert("🎉 You win! Final Score: "+score),500);
            }
          } else {
            setTimeout(()=>{
              first.innerText=""; second.innerText="";
              first.classList.remove("revealed");
              second.classList.remove("revealed");
              first=null; second=null;
            },1000);
          }
        }
      };
      grid.appendChild(card);
    });
  </script>
</body>
</html>
