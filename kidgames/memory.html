<!DOCTYPE html>
<html>
<head>
  <title>Memory Match</title>
  <style>
    body { text-align:center; font-family:Arial; }
    .grid { display:grid; grid-template-columns:repeat(4,100px); gap:10px; justify-content:center; }
    .card { width:100px; height:100px; background:#ccc; display:flex; align-items:center; justify-content:center; font-size:24px; cursor:pointer; }
  </style>
</head>
<body>
  <h1>🧠 Memory Match</h1>
  <div class="grid" id="grid"></div>
  <script>
    const grid = document.getElementById("grid");
    const emojis = ["🍎","🍌","🍇","🍓","🍎","🍌","🍇","🍓"];
    emojis.sort(()=>0.5-Math.random());
    let first=null, second=null;
    emojis.forEach(e=>{
      const card=document.createElement("div");
      card.className="card";
      card.dataset.value=e;
      card.onclick=()=>{
        if(card.innerText||second) return;
        card.innerText=e;
        if(!first){ first=card; }
        else { second=card;
          if(first.dataset.value===second.dataset.value){
            first=null; second=null;
          } else {
            setTimeout(()=>{ first.innerText=""; second.innerText=""; first=null; second=null; },1000);
          }
        }
      };
      grid.appendChild(card);
    });
  </script>
</body>
</html>
