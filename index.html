<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Game Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('ps4-controller.avif') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
    }
    .overlay {
      background-color: rgba(0, 0, 0, 0.7);
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin-bottom: 40px;
    }
    .games-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    .game-box {
      background-color: rgba(255, 255, 255, 0.1);
      border: 2px solid #fff;
      border-radius: 10px;
      width: 200px;
      height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      transition: transform 0.3s, background-color 0.3s;
    }
    .game-box:hover {
      transform: scale(1.05);
      background-color: rgba(255, 255, 255, 0.2);
    }
    .game-box a {
      color: #fff;
      text-decoration: none;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>🎮 My Game Collection</h1>
    <div class="games-container">
      <div class="game-box">
        <a href="game1.html">Game 1</a>
      </div>
      <div class="game-box">
        <a href="game2.html">Game 2</a>
      </div>
      <div class="game-box">
        <a href="game3.html">Game 3</a>
      </div>
      <div class="game-box">
        <a href="game4.html">Game 4</a>
      </div>
    </div>
  </div>
</body>
</html>
