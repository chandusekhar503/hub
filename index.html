<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chandrasekhar Hub</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #111827;
        color: #f9fafb;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .box {
        text-align: center;
        padding: 2rem 3rem;
        border: 1px solid #374151;
        border-radius: 12px;
        background: #1f2937;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 2rem;
      }

      p {
        margin: 0;
        font-size: 1.1rem;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Chandrasekhar Hub</h1>
      <p>Generate code for chandrasekhar hub.</p>
    </div>
    <div class="box">
      <h1>Game</h1>
      <p>click to play game</p>
    </div>
  </body>
</html>
